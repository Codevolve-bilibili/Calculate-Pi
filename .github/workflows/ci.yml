name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure CMake
        run: >
          cmake -B build -S .
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_CXX_STANDARD=20

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Locate executable
        id: exe
        shell: bash
        run: |
          # .gitignore 只影响本地 git 跟踪，不会阻止 CI 在运行时创建 build/。
          # 这里在运行时定位实际生成的可执行文件路径，避免 Windows 多配置
          # 生成器把 .exe 放到 build/Release/ 而导致路径 hard-code 失败。
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            if [ -f build/calculate_pi.exe ]; then
              echo "path=build/calculate_pi.exe" >> "$GITHUB_OUTPUT"
            else
              echo "path=build/Release/calculate_pi.exe" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "path=build/calculate_pi" >> "$GITHUB_OUTPUT"
          fi

      - name: Test help output
        shell: bash
        run: ./${{ steps.exe.outputs.path }} --help

      - name: Test compute output (English)
        shell: bash
        run: ./${{ steps.exe.outputs.path }} --terms 10 --stats --lang en

      - name: Test compute output (Chinese)
        shell: bash
        run: ./${{ steps.exe.outputs.path }} --terms 10 --stats --lang zh
